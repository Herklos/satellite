name: Publish TS Packages to GitHub Packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          registry-url: "https://npm.pkg.github.com"
          scope: "@${{ github.repository_owner }}"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Set version and scope from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          cd servers/ts
          npm pkg set "name=@${OWNER}/satellite-server" "version=$VERSION"
          cd ../../clients/ts
          npm pkg set "name=@${OWNER}/satellite-client" "version=$VERSION"

      - name: Publish satellite-server
        working-directory: servers/ts
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish satellite-client
        working-directory: clients/ts
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
